<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <style>
      body { font-family: -apple-system, "PingFang SC", sans-serif; max-width: 460px; margin: 40px auto; }
      label { display: block; margin: 14px 0 4px; font-size: 13px; font-weight: 600; }
      input { width: 100%; box-sizing: border-box; padding: 8px; font-size: 13px; }
      button { margin-top: 16px; background: #4f46e5; color: #fff; border: none; padding: 9px 16px; border-radius: 6px; cursor: pointer; }
      #saved { color: #16a34a; margin-left: 10px; font-size: 13px; }
      p { color: #666; font-size: 12px; }
    </style>
  </head>
  <body>
    <h2>AI Career Copilot · 设置</h2>
    <label for="apiBase">API 地址</label>
    <input id="apiBase" placeholder="http://localhost:8000" />
    <label for="token">JWT Token（登录后从 /api/v1/auth/login 获取，可留空走匿名 Level 0）</label>
    <input id="token" placeholder="eyJ..." />
    <div>
      <button id="save">保存</button><span id="saved"></span>
    </div>
    <p>提示：匿名模式下受频率限制；填入 Token 后可保存历史并积累 Profile。</p>
    <script src="options.js"></script>
  </body>
</html>
